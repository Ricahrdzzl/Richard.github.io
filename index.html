<!DOCTYPE html>

  <meta name="description" content="动态爱心表白页">
  <link rel="stylesheet" href="./style.css">

<body>

  <main>

      <div class="photo-frame">
        <div class="photo-glow"></div>
        <img src="./photo.jpg" alt="照片">

  <script src="./script.js"></script>
